name: uber
description: 'An Uber clone app built with Flutter and Supabase.'
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.9
  flutter_map: ^7.0.2
  flutter_map_pmtiles: ^1.0.0
  vector_map_tiles: ^8.0.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  duration: ^3.0.13
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
